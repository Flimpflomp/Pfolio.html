    INFO SW:
      [  
        <script> LangNR = 0 ; </script>  
        <script src="EXAMPLE-DirContentList.js"></script>

          <script>

      Snutten ovan bör finnas i värden (html-filen som ska använda denna).

      DirContentList.js ser ut på ett ungefär såhär och behöver innehålla detta:
      <script>
      picFiles = ["foo.png", "bar.png"]    //namn på alla bildfiler i directoryt 
      picDir = "/public/Portfolio/"        //path till directoryt 
      </script>
      Namnet på bildfilen används som beskrivningen (<p id=imgext>), d.v.s. texten som visas under bilden i storbildsvyn. 
      Bildfilers namn kan innehålla en separator [ !NEWLANG! ] för att trigga flerspråksläge, där texten efter [ !NEWLANG! ] är språk 1 och texten innan är språk 0.
      Namnet på bildfilen skulle således kunna vara:
      [  foo_-_ord_och_meningar_!NEWLANG!_foo_-_words_and_sentences.png  ] 
      här används understräck istället för mellanslag! (dessa byts ut mot mellanslag i runtime så understräck är inte möjliga att använda i beskrivningar)
      ser det så ut så kommer koden välja språk baserat på variabeln [ LangNR ] definierad i värdsfilen (som definerad ovan). 
      du kan även ha flera språk än så men koden är inte testad ordentligt för det ändamålet. 
      Bindesträcket med mellanslag (understräck) på var sida skiljer namn och beskrivning.
      
      Mer info finns att hitta på projektets GitHub!
  
    INFO EN:
      [  
        <script> LangNR = 0 ; </script>  
        <script src="EXAMPLE-DirContentList.js"></script>
        <script src="http://code.jquery.com/jquery-1.10.2.js"></script>
        <script>
            $(function(){
            $('.PFOLIO').load("Pfolio.html"); 
            });
        </script>
        <div class="PFOLIO"></div>
      ]
      The snippet above should be included in the host (the HTML file that intends to use Pfolio.html).
      this example uses JQuery and is, thus far, the only code at all tested.
  
      DirContentList.js looks something like this and needs to contain the following:
      [
        <script>
        picFiles = [“foo.png”, “bar.png”]    //names of all image files in the directory 
        picDir = “/public/Portfolio/”        //path to the directory 
        </script>
      ]
      The name of the image file is used as the description (<p id=imgext>), i.e., the text displayed below the image in the big-picture view (<div id="displayBox"...). 
      Image file names can contain a separator [ !NEWLANG! ] to trigger multilingual mode, where the text after [ !NEWLANG! ] is language 1 and the text before is language 0.
      The name of an image file could thus be:
      [  foo_-_ord_och_meningar_!NEWLANG!_foo_-_words_and_sentences.png  ] 
      Here, underscores are used instead of spaces! (These are replaced with spaces at runtime, so underscores cannot be used in descriptions)
      If it looks like this, the code will select the language based on the variable [ LangNR ] defined in the host file (as defined above). 
      You can also have more languages than that, but the code hasn’t been thoroughly tested for that purpose. 
      The hyphen with spaces on either side separates the name and the description.
      
      More info can be found on the project’s GitHub!

  <body> 
    
    <style>
      :root{
        --PFLO-border-color: #867DB0;
        --PFLO-button-text: white;
        --PFLO-button-bg: #141424;
        --PFLO-button-bg-hover: #2d2d64;
        --PFLO-button-bg-click: #6565b9;
      }
    </style>


    <div  id="instruction" style=" display:block; border: 3px solid var(--PFLO-border-color); text-align:center; margin-bottom:6px; ">
      <p>[klicka på en bild nedan för att se den i storformat!]</p>
    </div>
    <div id="displayBox" style="display:none; border: 3px solid var(--PFLO-border-color); padding:6px; margin-bottom:6px;">
        <script>
          function activateBrowse(curPic) {
            //kod för att stänga och öppna olika divs:
            document.getElementById("displayBox").style.display="block";
            document.getElementById("instruction").style.display="none";    
            window.location.hash = curPic;
            //utvinna bildtext, ev efter språk:
            var titlNdescr = picFiles[curPic].replace(".png","").replaceAll("_"," "); 
            if (titlNdescr.includes("!NEWLANG!") == true && LangNR != undefined){
              var TNDlangs = titlNdescr.split("!NEWLANG!")
              titlNdescr = TNDlangs[LangNR]
            }else{}
            document.getElementById("imgtext").innerHTML = titlNdescr ;
            //och visa rätt bild:
            var X = '<img src="' +  picDir+picFiles[window.location.hash.replace("#", "")]  + '">';
            document.getElementById("bigPic").innerHTML = X ;
          }
          //definierar knapparnas funktioner
          function picNav(dir){
            var picNow = parseInt(window.location.hash.replace("#", ""))
            var lastPic = picFiles.length - 1
            switch(dir){
              case "bck":   
                if (picNow == 0){ activateBrowse(lastPic); } else { let picNew = picNow -=1; activateBrowse(picNew); }
                break;
              case "fwd":
                if (picNow == lastPic){ activateBrowse(0); } else { let picNew = picNow +=1; activateBrowse(picNew); }
                break;
              case "up":
                window.open(""+ picDir + picFiles[picNow]);
                break;
            }
          }
          //testa om URL:en innehåller ett giltligt bildnummer och ställ i.s.f. framm rätt bild:
          let curHash = window.location.hash.replace("#", "")
          let portfLen = picFiles.length
          if (curHash != "" && !isNaN(Number(curHash)) && curHash >= 0 && curHash < portfLen ){
            let picNr = parseInt(window.location.hash.replace("#", ""));
            activateBrowse(picNr);
          }else{}

        </script>
        <style>
          .bigdisplay {
            margin-left: auto; margin-right: auto;
            border:0; 
            border-bottom: 3px solid var(--PFLO-border-color);
            margin-bottom: 6px;
          }
          @media only screen and (orientation: portrait){
            .bigdisplay { height: auto; width: 100%;}
          }
          @media only screen and (orientation: landscape){
            .bigdisplay { height: 80vh; width:auto;}
          }
          .bigdisplay .bigPic {
            height: 90%;
            width: 100%;
            padding: 6px;
          }    
          .bigdisplay .bigPic img {
            display: block;
            height: 100%;
            width: 100%;
            object-fit: contain;
          }
          .buttonPannel button {
            border-radius: 4px;
            border: 3px solid var(--PFLO-border-color);
            background-color: var(--PFLO-button-bg);
            font-size: 16px;
            text-align: center;
            padding: 10px 10px;
            width: auto;
            color: var(--PFLO-button-text);
            cursor: pointer;
          }
          .buttonPannel button:hover { background-color: var(--PFLO-button-bg-hover); }
          .buttonPannel button:active{ background-color: var(--PFLO-button-bg-click); }
        </style>
      <div id="bigdisplay" class="bigdisplay"> 
        <div id="bigPic" class="bigPic"></div>
        <p id="imgtext" style="text-align: center;"></p>
      </div>
      <div class="buttonPannel" style="display:flex; justify-content:space-between; margin:6px;">
        <button onclick="picNav('bck')">[⇐]</button>
        <button onclick="picNav('up')">[⇑]</button>
        <button onclick="picNav('fwd')">[⇒]</button>
      </div>
    </div> <!-- slut på dispbox !-->




    
    <div id="portfskroll">
      <script>
        function activateGrid(divId) {
          var X = "<!--autocode for dispgrid follows untill end of div!-->  ";
          let len = picFiles.length;
          for (let i = 0; i < len; i++){
            var imgName = picFiles[i].replace(".png", "").replaceAll("_"," ");
            if (imgName.includes("!NEWLANG!") == true && imgName.includes(" - ") && LangNR != undefined){ 
              var picTitl = imgName.split("!NEWLANG!")[LangNR].split(" - ")[0]
            }else if(imgName.includes(" - ") == true){
              var picTitl = imgName.split(" - ")[0]
            }else{ var picTitl = imgName}
            X += '<div class="imgbox" href="#'+ i +'" onclick="activateBrowse('+ i +')" ><img src="'+  picDir+picFiles[i]  +'">'+ '<p>[ '+picTitl+' ]</p>' +'</div>'; 
          };
          document.getElementById(divId).innerHTML = X ;
        }
      </script>
      <style>
        .autogallery{
          display: flex;
          flex-wrap: wrap;
          justify-content: space-evenly;
        }
        .autogallery .imgbox {
          border: 3px solid var(--PFLO-border-color);
          display: flex;
          flex-direction: column;
          justify-content: center;
          margin: 3px;
        }
        .imgbox img {
          max-height: 15vh;
        }
        @media only screen and (orientation: landscape){
          .imgbox img { max-height: 20vh; }
        }  
        .imgbox p{
        text-align: center;
        }     
      </style>
      <script>activateGrid('autogallery');</script>
      <div id="autogallery" class="autogallery" onload="activateGrid('autogallery');"><p>wait...</p></div>
    </div> <!-- slut på portfolio skrollen !-->

  </body>
</html>
